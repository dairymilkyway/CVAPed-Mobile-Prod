name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: project-75d04eb0-a4d7-4d9c-849
  REGION: us-central1
  SERVICE: cvacare-backend
  WORKDIR: backend
  DB_NAME: ${{ secrets.DB_NAME }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
  CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
  CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
  AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
  AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
  FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry exists
        run: |
          gcloud artifacts repositories describe backend-images \
            --location=${{ env.REGION }} >/dev/null 2>&1 || \
          gcloud artifacts repositories create backend-images \
            --repository-format=docker \
            --location=${{ env.REGION }}

      - name: Build image
        run: |
          gcloud builds submit ./${{ env.WORKDIR }} \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/backend-images/${{ env.SERVICE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/backend-images/${{ env.SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 2Gi \
            --cpu 1 \
            --timeout 300 \
            --max-instances 3 \
            --command /bin/sh -- -c "/usr/local/bin/patch-frozendict.sh && node start.js" \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "FLASK_ENV=production" \
            --set-env-vars "USE_GLOBAL_PYTHON=true" \
            --set-env-vars "GAIT_ANALYSIS_PORT=5001" \
            --set-env-vars "THERAPY_PORT=5002" \
            --set-env-vars "CORS_ORIGINS=${{ env.CORS_ORIGINS }}" \
            --set-env-vars "MONGODB_URI=${{ secrets.MONGODB_URI }}" \
            --set-env-vars "DB_NAME=${{ env.DB_NAME }}" \
            --set-env-vars "JWT_SECRET=${{ env.JWT_SECRET }}" \
            --set-env-vars "SECRET_KEY=${{ env.JWT_SECRET }}" \
            --set-env-vars "GOOGLE_CLIENT_ID=${{ env.GOOGLE_CLIENT_ID }}" \
            --set-env-vars "CLOUDINARY_CLOUD_NAME=${{ env.CLOUDINARY_CLOUD_NAME }}" \
            --set-env-vars "CLOUDINARY_API_KEY=${{ env.CLOUDINARY_API_KEY }}" \
            --set-env-vars "CLOUDINARY_API_SECRET=${{ env.CLOUDINARY_API_SECRET }}" \
            --set-env-vars "AZURE_SPEECH_KEY=${{ env.AZURE_SPEECH_KEY }}" \
            --set-env-vars "AZURE_SPEECH_REGION=${{ env.AZURE_SPEECH_REGION }}" \
            --set-env-vars "FIREBASE_SERVICE_ACCOUNT_JSON_BASE64=${{ env.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}"

      - name: Smoke test
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE }} --region ${{ env.REGION }} --format='value(status.url)')
          curl --fail "$SERVICE_URL/readyz"
          curl --fail "$SERVICE_URL/"
