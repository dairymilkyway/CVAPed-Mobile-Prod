name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-cloud-run.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-cloud-run-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: project-75d04eb0-a4d7-4d9c-849
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: cvacare-backend
  ARTIFACT_REPOSITORY: backend-images
  GCP_SERVICE_ACCOUNT: github-actions-cloud-run@project-897ce48e-6275-4757-ab9.iam.gserviceaccount.com
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/526387613359/locations/global/workloadIdentityPools/github-actions-pool/providers/github
  CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: 526387613359-compute@developer.gserviceaccount.com
  IMAGE_NAME: cvacare-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Validate backend Python files
        shell: bash
        run: |
          python - <<'PY'
          import pathlib
          import py_compile

          backend_dir = pathlib.Path('backend')
          skipped_dirs = {'venv', '.venv', '__pycache__'}

          for path in backend_dir.rglob('*.py'):
              if any(part in skipped_dirs for part in path.parts):
                  continue
              py_compile.compile(str(path), doraise=True)

          print('Backend Python validation passed')
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push backend container image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend image to Cloud Run
        id: deploy
        shell: bash
        env:
          IMAGE_URI: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          gcloud run services update "$CLOUD_RUN_SERVICE" \
            --image "$IMAGE_URI" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --command "/bin/sh" \
            --args "-c,/usr/local/bin/patch-frozendict.sh && node start.js" \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "FLASK_ENV=production" \
            --set-env-vars "USE_GLOBAL_PYTHON=true" \
            --set-env-vars "GAIT_ANALYSIS_PORT=5001" \
            --set-env-vars "THERAPY_PORT=5002" \
            --set-env-vars "CORS_ORIGINS=${CORS_ORIGINS}" \
            --set-env-vars "MONGODB_URI=${MONGODB_URI}" \
            --set-env-vars "DB_NAME=${DB_NAME}" \
            --set-env-vars "JWT_SECRET=${JWT_SECRET}" \
            --set-env-vars "SECRET_KEY=${JWT_SECRET}" \
            --set-env-vars "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
            --set-env-vars "CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}" \
            --set-env-vars "CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}" \
            --set-env-vars "CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}" \
            --set-env-vars "AZURE_SPEECH_KEY=${AZURE_SPEECH_KEY}" \
            --set-env-vars "AZURE_SPEECH_REGION=${AZURE_SPEECH_REGION}" \
            --set-env-vars "FIREBASE_SERVICE_ACCOUNT_JSON_BASE64=${FIREBASE_SERVICE_ACCOUNT_JSON_BASE64}" \
            --quiet

          SERVICE_URL=$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)')

          echo "service_url=$SERVICE_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed backend to $SERVICE_URL"

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "## Backend Deploy Succeeded"
            echo ""
            echo "- Service: \`${CLOUD_RUN_SERVICE}\`"
            echo "- Region: \`${GCP_REGION}\`"
            echo "- Image: \`${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}\`"
            echo "- URL: ${{ steps.deploy.outputs.service_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
